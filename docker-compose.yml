services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - backend_data:/app/.local
    environment:
      ENV: development
      MOCK_LLM: "true"
      FRONTEND_ORIGIN: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_data:
